<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>スライムタスク</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#2ecc71"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="スライムタスク"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="icon" href="icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Zen Maru Gothic',sans-serif;
      background:linear-gradient(160deg,#e8fff2 0%,#d0f7e0 40%,#e0f8ff 100%);
      min-height:100vh;
      min-height:100dvh;
    }
    :root{
      --green:#2ecc71;--green2:#27ae60;--green3:#52c87a;
      --light:#e8fff2;--border:#c0ecd0;--text:#1e5e35;--sub:#52a36e;
    }
    @keyframes slimeWobble{
      0%,100%{transform:scaleX(1) scaleY(1);}
      30%{transform:scaleX(1.08) scaleY(0.95);}
      60%{transform:scaleX(0.95) scaleY(1.06);}
    }
    @keyframes fadeIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}

    /* Header */
    #header{
      background:linear-gradient(135deg,#2ecc71,#27ae60);
      padding:14px 16px 12px;
      position:sticky;top:0;z-index:100;
      box-shadow:0 4px 24px rgba(46,204,113,0.3);
    }
    #header-inner{max-width:480px;margin:0 auto;display:flex;align-items:center;gap:12px;}
    #header-slime{animation:slimeWobble 2.5s ease-in-out infinite;}
    #app-title{font-size:20px;font-weight:900;color:white;letter-spacing:1px;line-height:1.1;}
    #app-sub{font-size:10px;color:rgba(255,255,255,0.75);letter-spacing:2px;}
    #view-toggle{
      margin-left:auto;display:flex;
      background:rgba(255,255,255,0.2);border-radius:20px;padding:3px;
    }
    .toggle-btn{
      background:none;border:none;border-radius:17px;padding:5px 12px;
      cursor:pointer;font-size:15px;transition:background 0.2s;
    }
    .toggle-btn.active{background:white;}

    /* Main */
    #main{max-width:480px;margin:0 auto;padding:14px 10px 40px;}

    /* Month nav */
    #month-nav{
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(255,255,255,0.55);border-radius:20px;
      padding:8px 12px;margin-bottom:12px;border:1.5px solid var(--border);
    }
    #month-nav button{
      background:none;border:none;font-size:22px;cursor:pointer;
      color:var(--green);font-weight:700;padding:0 6px;
    }
    #month-nav button:disabled{color:var(--border);cursor:default;}
    #month-label{font-size:18px;font-weight:800;color:var(--text);}
    #today-badge{
      font-size:10px;background:var(--green);color:white;
      border-radius:10px;padding:2px 8px;font-weight:700;margin-left:8px;
    }

    /* Stats */
    #stats-bar{
      background:rgba(255,255,255,0.55);border-radius:14px;
      padding:8px 14px;margin-bottom:12px;border:1.5px solid var(--border);
      display:flex;align-items:center;gap:10px;
    }
    #stats-label{font-size:11px;color:var(--sub);font-weight:700;white-space:nowrap;}
    #stats-track{flex:1;background:#c8eed8;border-radius:6px;height:8px;overflow:hidden;}
    #stats-fill{background:linear-gradient(90deg,#52c87a,#2ecc71);height:100%;border-radius:6px;transition:width 0.4s;}
    #stats-count{font-size:11px;color:var(--green3);font-weight:800;}

    /* Calendar */
    #weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;}
    .wd{text-align:center;font-size:11px;font-weight:700;padding:4px 0;}
    .wd-sun{color:#e87070;}.wd-sat{color:#6090e8;}.wd-week{color:var(--sub);}
    #calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
    .day-cell{
      border-radius:11px;border:1.5px solid var(--border);
      background:rgba(255,255,255,0.55);
      padding:5px 3px 7px;min-height:60px;
      display:flex;flex-direction:column;align-items:center;
      cursor:pointer;transition:transform 0.12s,box-shadow 0.12s;
      position:relative;
    }
    .day-cell:active{transform:scale(0.96);}
    .day-cell.today{border:2.5px solid var(--green);background:linear-gradient(135deg,#e8fff2,#d0fadf);}
    .day-cell.all-done{background:linear-gradient(135deg,#d4f7e0,#b8f0cc);border-color:#7ee8a2;}
    .day-num{font-size:12px;font-weight:700;margin-bottom:2px;}
    .day-num.sun{color:#e87070;}.day-num.sat{color:#6090e8;}.day-num.today-num{color:var(--green);}
    .day-num.normal{color:#2d6e40;}
    .progress-wrap{width:80%;margin-top:2px;}
    .progress-track{background:#c8eed8;border-radius:4px;height:4px;overflow:hidden;}
    .progress-fill{background:linear-gradient(90deg,#52c87a,#2ecc71);height:100%;border-radius:4px;}
    .progress-count{font-size:8px;color:var(--sub);text-align:center;margin-top:1px;}
    .memo-dot{width:6px;height:6px;border-radius:50%;background:#f0b942;position:absolute;top:4px;right:5px;}
    .slime-mini{font-size:14px;line-height:1;}

    /* List view */
    #list-view{display:flex;flex-direction:column;gap:10px;}
    .list-empty{text-align:center;padding:40px 0;color:#90c8a0;font-size:14px;}
    .list-item{
      background:rgba(255,255,255,0.65);border:1.5px solid var(--border);
      border-radius:16px;padding:12px 14px;cursor:pointer;
      transition:transform 0.1s,box-shadow 0.1s;
    }
    .list-item:active{transform:translateX(3px);}
    .list-item.all-done{background:linear-gradient(135deg,#d4f7e0,#b8f0cc);border-color:#7ee8a2;}
    .list-date{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px;}
    .list-date.sun{color:#e87070;}.list-date.sat{color:#6090e8;}
    .task-chips{display:flex;flex-wrap:wrap;gap:5px;}
    .task-chip{
      font-size:11px;padding:3px 10px;border-radius:20px;
      background:rgba(200,238,216,0.8);color:#2d6e40;border:1px solid #b8e0c8;
    }
    .task-chip.done{background:rgba(82,200,122,0.18);color:#2ecc71;border-color:#7ee8a260;text-decoration:line-through;}
    .list-memo{
      margin-top:6px;font-size:11px;color:var(--sub);
      background:rgba(255,245,200,0.5);border-radius:8px;padding:4px 8px;
    }
    .list-progress{display:flex;align-items:center;gap:8px;margin-top:8px;}
    .list-progress-track{flex:1;background:#c8eed8;border-radius:6px;height:5px;overflow:hidden;}
    .list-progress-fill{background:linear-gradient(90deg,#52c87a,#2ecc71);height:100%;border-radius:6px;}
    .list-progress-count{font-size:10px;color:var(--sub);font-weight:700;}

    /* Modal overlay */
    #overlay{
      display:none;position:fixed;inset:0;
      background:rgba(30,60,40,0.45);z-index:1000;
      align-items:center;justify-content:center;
      backdrop-filter:blur(4px);
    }
    #overlay.open{display:flex;animation:fadeIn 0.18s ease;}
    #modal{
      background:linear-gradient(135deg,#f0fff4,#e0faea);
      border-radius:28px;padding:24px 22px 20px;
      width:min(92vw,400px);max-height:90dvh;overflow-y:auto;
      box-shadow:0 12px 48px rgba(40,120,60,0.22);
      border:2px solid rgba(126,232,162,0.5);
    }
    #modal-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    #modal-title{font-size:19px;font-weight:800;color:var(--text);}
    #modal-close{
      margin-left:auto;background:none;border:none;cursor:pointer;
      font-size:20px;color:#7ec89a;line-height:1;padding:0;
    }
    .field-label{font-size:11px;color:var(--sub);letter-spacing:1px;margin-bottom:5px;display:block;}
    #memo-input{
      width:100%;min-height:68px;border:2px solid #a8e6c0;border-radius:14px;
      padding:10px 12px;font-size:14px;font-family:'Zen Maru Gothic',sans-serif;
      color:var(--text);background:rgba(255,255,255,0.7);resize:vertical;outline:none;
      margin-bottom:14px;
    }
    #task-list{max-height:160px;overflow-y:auto;margin-bottom:8px;}
    .task-row{
      display:flex;align-items:center;gap:8px;
      background:rgba(255,255,255,0.6);border-radius:10px;
      padding:7px 10px;margin-bottom:5px;border:1.5px solid #c8eed8;
    }
    .task-row.done{background:rgba(126,232,162,0.18);border-color:#7ee8a260;}
    .task-row input[type=checkbox]{accent-color:#52c87a;width:16px;height:16px;cursor:pointer;flex-shrink:0;}
    .task-row span{flex:1;font-size:13px;color:var(--text);}
    .task-row.done span{color:#90c8a0;text-decoration:line-through;}
    .task-row button{background:none;border:none;cursor:pointer;color:#b0d8b8;font-size:15px;}
    #task-add-row{display:flex;gap:8px;}
    #new-task-input{
      flex:1;border:2px solid #a8e6c0;border-radius:12px;padding:8px 12px;
      font-size:13px;font-family:'Zen Maru Gothic',sans-serif;color:var(--text);
      background:rgba(255,255,255,0.7);outline:none;
    }
    #add-task-btn{
      background:linear-gradient(135deg,#7ee8a2,#52c87a);border:none;
      border-radius:12px;padding:8px 14px;cursor:pointer;
      color:white;font-weight:700;font-size:17px;
    }
    #save-btn{
      width:100%;margin-top:16px;
      background:linear-gradient(135deg,#52c87a,#2ecc71);border:none;
      border-radius:16px;padding:12px;cursor:pointer;
      color:white;font-weight:800;font-size:15px;
      font-family:'Zen Maru Gothic',sans-serif;letter-spacing:1px;
      box-shadow:0 4px 16px rgba(82,200,122,0.4);
    }
    #hint{text-align:center;margin-top:14px;font-size:11px;color:#90c8a0;letter-spacing:1px;}
  </style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div id="header-slime">
      <svg width="44" height="35" viewBox="0 0 100 80">
        <ellipse cx="50" cy="44" rx="46" ry="36" fill="#7ee8a2" opacity="0.92"/>
        <ellipse cx="50" cy="38" rx="38" ry="30" fill="#7ee8a2"/>
        <circle cx="34" cy="30" r="7" fill="white" opacity="0.55"/>
        <circle cx="38" cy="26" r="3" fill="white" opacity="0.8"/>
      </svg>
    </div>
    <div>
      <div id="app-title">スライムタスク</div>
      <div id="app-sub">SLIME TASK 2026</div>
    </div>
    <div id="view-toggle">
      <button class="toggle-btn active" id="btn-cal" onclick="setView('calendar')">📅</button>
      <button class="toggle-btn" id="btn-list" onclick="setView('list')">📋</button>
    </div>
  </div>
</div>

<div id="main">
  <div id="month-nav">
    <button id="prev-btn" onclick="changeMonth(-1)">‹</button>
    <div><span id="month-label"></span><span id="today-badge" style="display:none">TODAY</span></div>
    <button id="next-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div id="stats-bar" style="display:none">
    <span id="stats-label">今月の進捗</span>
    <div id="stats-track"><div id="stats-fill" style="width:0%"></div></div>
    <span id="stats-count"></span>
  </div>
  <div id="calendar-view">
    <div id="weekdays"></div>
    <div id="calendar-grid"></div>
  </div>
  <div id="list-view" style="display:none"></div>
  <div id="hint">日付をタップしてタスクを追加 🟢</div>
</div>

<!-- Modal -->
<div id="overlay" onclick="overlayClick(event)">
  <div id="modal">
    <div id="modal-header">
      <svg width="36" height="29" viewBox="0 0 100 80">
        <ellipse cx="50" cy="44" rx="46" ry="36" fill="#7ee8a2" opacity="0.92"/>
        <ellipse cx="50" cy="38" rx="38" ry="30" fill="#7ee8a2"/>
        <circle cx="34" cy="30" r="7" fill="white" opacity="0.55"/>
        <circle cx="38" cy="26" r="3" fill="white" opacity="0.8"/>
      </svg>
      <div id="modal-title"></div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <label class="field-label">📝 メモ</label>
    <textarea id="memo-input" placeholder="今日のメモを書こう…"></textarea>
    <label class="field-label">✅ タスク</label>
    <div id="task-list"></div>
    <div id="task-add-row">
      <input id="new-task-input" type="text" placeholder="新しいタスクを追加…" onkeydown="if(event.key==='Enter')addTask()"/>
      <button id="add-task-btn" onclick="addTask()">＋</button>
    </div>
    <button id="save-btn" onclick="saveModal()">保存する 🟢</button>
  </div>
</div>

<script>
const YEAR = 2026;
const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const WEEKDAYS = ["日","月","火","水","木","金","土"];
let currentMonth = new Date().getFullYear() === YEAR ? new Date().getMonth() : 0;
let currentView = "calendar";
let modalKey = null;
let modalTasks = [];
let data = {};

// ---- Storage ----
function loadData() {
  try { data = JSON.parse(localStorage.getItem("slime-tasks-2026") || "{}"); } catch { data = {}; }
}
function saveData() {
  localStorage.setItem("slime-tasks-2026", JSON.stringify(data));
}

// ---- Helpers ----
function daysInMonth(m) { return new Date(YEAR, m+1, 0).getDate(); }
function firstDay(m) { return new Date(YEAR, m, 1).getDay(); }
function dateKey(m, d) {
  return `${YEAR}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}
function isToday(m, d) {
  const t = new Date();
  return t.getFullYear()===YEAR && t.getMonth()===m && t.getDate()===d;
}

// ---- Render ----
function render() {
  renderMonthNav();
  renderStats();
  if (currentView === "calendar") {
    document.getElementById("calendar-view").style.display = "";
    document.getElementById("list-view").style.display = "none";
    renderCalendar();
  } else {
    document.getElementById("calendar-view").style.display = "none";
    document.getElementById("list-view").style.display = "";
    renderList();
  }
}

function renderMonthNav() {
  document.getElementById("month-label").textContent = `${YEAR}年 ${MONTHS[currentMonth]}`;
  const today = new Date();
  const badge = document.getElementById("today-badge");
  badge.style.display = (today.getFullYear()===YEAR && today.getMonth()===currentMonth) ? "" : "none";
  document.getElementById("prev-btn").disabled = currentMonth === 0;
  document.getElementById("next-btn").disabled = currentMonth === 11;
}

function renderStats() {
  let total = 0, done = 0;
  for (let d = 1; d <= daysInMonth(currentMonth); d++) {
    const e = data[dateKey(currentMonth, d)];
    if (e?.tasks) { total += e.tasks.length; done += e.tasks.filter(t=>t.done).length; }
  }
  const bar = document.getElementById("stats-bar");
  if (total === 0) { bar.style.display = "none"; return; }
  bar.style.display = "flex";
  document.getElementById("stats-fill").style.width = `${Math.round((done/total)*100)}%`;
  document.getElementById("stats-count").textContent = `${done}/${total}${done===total?"🟢":""}`;
}

function renderCalendar() {
  // weekdays
  const wdEl = document.getElementById("weekdays");
  wdEl.innerHTML = WEEKDAYS.map((w,i) =>
    `<div class="wd ${i===0?"wd-sun":i===6?"wd-sat":"wd-week"}">${w}</div>`
  ).join("");

  const grid = document.getElementById("calendar-grid");
  const days = daysInMonth(currentMonth);
  const first = firstDay(currentMonth);
  let html = "";

  // empty cells
  for (let i = 0; i < first; i++) html += `<div></div>`;

  for (let d = 1; d <= days; d++) {
    const key = dateKey(currentMonth, d);
    const e = data[key];
    const total = e?.tasks?.length || 0;
    const done = e?.tasks?.filter(t=>t.done).length || 0;
    const hasMemo = e?.memo?.trim();
    const allDone = total > 0 && done === total;
    const today = isToday(currentMonth, d);
    const dow = (first + d - 1) % 7;
    const isSun = dow===0, isSat = dow===6;

    let cellClass = "day-cell";
    if (today) cellClass += " today";
    if (allDone) cellClass += " all-done";

    let numClass = "day-num " + (today ? "today-num" : isSun ? "sun" : isSat ? "sat" : "normal");

    let inner = `<span class="${numClass}">${d}</span>`;
    if (allDone) inner += `<span class="slime-mini">🟢</span>`;
    if (total > 0) {
      inner += `<div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" style="width:${Math.round((done/total)*100)}%"></div></div>
        <div class="progress-count">${done}/${total}</div>
      </div>`;
    }
    if (hasMemo) inner += `<div class="memo-dot"></div>`;

    html += `<div class="${cellClass}" onclick="openModal('${key}',${d})">${inner}</div>`;
  }
  grid.innerHTML = html;
}

function renderList() {
  const el = document.getElementById("list-view");
  const days = daysInMonth(currentMonth);
  let html = "";
  let hasAny = false;

  for (let d = 1; d <= days; d++) {
    const key = dateKey(currentMonth, d);
    const e = data[key];
    if (!e || (!e.tasks?.length && !e.memo?.trim())) continue;
    hasAny = true;

    const total = e.tasks?.length || 0;
    const done = e.tasks?.filter(t=>t.done).length || 0;
    const allDone = total > 0 && done === total;
    const dow = new Date(YEAR, currentMonth, d).getDay();
    const dowLabel = WEEKDAYS[dow];
    const isSun = dow===0, isSat = dow===6;
    const itemClass = "list-item" + (allDone ? " all-done" : "");
    const dateClass = "list-date" + (isSun ? " sun" : isSat ? " sat" : "");

    let inner = `<div class="${dateClass}">${d}日（${dowLabel}）${allDone?"&nbsp;🟢":""}</div>`;
    if (e.tasks?.length) {
      inner += `<div class="task-chips">${e.tasks.map(t =>
        `<span class="task-chip${t.done?" done":""}">${escHtml(t.text)}</span>`
      ).join("")}</div>`;
    }
    if (e.memo?.trim()) inner += `<div class="list-memo">📝 ${escHtml(e.memo)}</div>`;
    if (total > 0) {
      inner += `<div class="list-progress">
        <div class="list-progress-track"><div class="list-progress-fill" style="width:${Math.round((done/total)*100)}%"></div></div>
        <span class="list-progress-count">${done}/${total}</span>
      </div>`;
    }
    html += `<div class="${itemClass}" onclick="openModal('${key}',${d})">${inner}</div>`;
  }

  if (!hasAny) html = `<div class="list-empty">🟢<br><br>まだタスクがありません。<br>日付をタップして追加しよう！</div>`;
  el.innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ---- Modal ----
function openModal(key, d) {
  modalKey = key;
  const e = data[key] || {};
  modalTasks = (e.tasks || []).map(t => ({...t}));
  document.getElementById("modal-title").textContent = `${YEAR}年${currentMonth+1}月${d}日`;
  document.getElementById("memo-input").value = e.memo || "";
  renderModalTasks();
  document.getElementById("new-task-input").value = "";
  document.getElementById("overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  modalKey = null;
}

function overlayClick(e) {
  if (e.target === document.getElementById("overlay")) closeModal();
}

function renderModalTasks() {
  const el = document.getElementById("task-list");
  if (!modalTasks.length) {
    el.innerHTML = `<div style="font-size:12px;color:#a0c8a8;padding:6px 0;">タスクがまだありません</div>`;
    return;
  }
  el.innerHTML = modalTasks.map((t,i) =>
    `<div class="task-row${t.done?" done":""}">
      <input type="checkbox" ${t.done?"checked":""} onchange="toggleTask(${i})"/>
      <span>${escHtml(t.text)}</span>
      <button onclick="removeTask(${i})">✕</button>
    </div>`
  ).join("");
}

function toggleTask(i) {
  modalTasks[i].done = !modalTasks[i].done;
  renderModalTasks();
}
function removeTask(i) {
  modalTasks.splice(i, 1);
  renderModalTasks();
}
function addTask() {
  const inp = document.getElementById("new-task-input");
  const text = inp.value.trim();
  if (!text) return;
  modalTasks.push({ text, done: false });
  inp.value = "";
  renderModalTasks();
  inp.focus();
}

function saveModal() {
  if (!modalKey) return;
  const memo = document.getElementById("memo-input").value;
  data[modalKey] = { memo, tasks: modalTasks };
  saveData();
  closeModal();
  render();
}

// ---- View / Month ----
function setView(v) {
  currentView = v;
  document.getElementById("btn-cal").classList.toggle("active", v==="calendar");
  document.getElementById("btn-list").classList.toggle("active", v==="list");
  render();
}
function changeMonth(d) {
  currentMonth = Math.max(0, Math.min(11, currentMonth + d));
  render();
}

// ---- Service Worker ----
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

// ---- Init ----
loadData();
render();
</script>
</body>
</html>
